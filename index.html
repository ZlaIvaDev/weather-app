<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-body">
        <h2>Weather</h2>
        <div class="search-area">
            <label>city:</label>
            <input type="text" name="get-city" id="get-city">
            <button type="submit" id="city-get">search</button>
        </div>
        

        <div class="results">
            <p class="city" aria-placeholder="Nis"></p>
            <p class="temp" aria-placeholder="22">temperature: </p>
            <p class="min" aria-placeholder="17">min temp: </p>
            <p class="max" aria-placeholder="26">max temt: </p>
            <p class="placeholder">#</p>
        </div>
    </div>


    <script src="javascript.js"></script>
</body>
</html>
