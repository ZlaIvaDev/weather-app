<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-body">
        <h2>Weather</h2>
        <div class="search-area">
            <label>city:</label>
            <input type="text" name="get-city" id="get-city">
            <button type="submit" id="city-get">search</button>
        </div>
        

        <div class="results">
            <h3 class="city-name">#</h3>
            <p class="city"></p>
            <p class="temp">temperature: </p>
            <p class="min">min temp: </p>
            <p class="max">max temt: </p>
            <p class="weather">weather: </p>
            <p class="description">description: </p>
            <p class="wind">wind: </p>
        </div>
    </div>


    <script src="javascript.js"></script>
</body>
</html>
